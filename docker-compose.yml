services: 
  redis:
    image: redis:7
    ports:
      - "6379:6379"
      
  backend:
    build: 
      context: ./backend
    command: node dist/app.js
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
    command: node dist/queues/scheduler.js
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    restart: unless-stopped
  
  worker:
    build: 
      context: ./backend
    command: node dist/queues/worker.js
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5001
    restart: unless-stopped
